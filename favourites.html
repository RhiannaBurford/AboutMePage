        <link href="stylesABOUTME.css" rel="stylesheet">
        <title>My Webpage</title>

    </head>
    <script>
        window.onload = function() {
        const text = document.getElementById("scroll-text");
        let position = window.innerWidth;
        text.style.position = "absolute";
        text.style.whiteSpace = "nowrap";

        function scrollText() {
            position -= 2;
            if (position < -text.offsetWidth) {
                position = window.innerWidth;
            }
            text.style.left = position + "px";
            requestAnimationFrame(scrollText);
        }

        scrollText();
    };

        scrollText(); // start the animation
    </script>
    <body>
        <div class="page-frame">
        <h1 id="scroll-text"><b>MY FAVOURITES</b></h1>
        <br>
        <br>
        <h2> <b> <u>Favourite sandwich?</u> </b></h2>

        <p> Green</p>

        <p> Strike by Robert Galbraith</p>
